<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groundcheck</title>
    <link rel="stylesheet" href="./src/components/w3.css" />
    <style>
      body {
        margin: 0;
        padding-bottom: 14rem;
      }

      .gc-topbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: nowrap;
        overflow-x: auto;
      }

      .gc-topbar .gc-topbar-spacer {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex: 0 0 auto;
      }

      .gc-topbar .w3-bar-item {
        float: none;
        display: flex;
        align-items: center;
        padding-top: 0;
        padding-bottom: 0;
        width: auto;
      }

      .gc-topbar h1 {
        margin: 0;
        white-space: nowrap;
        font-size: clamp(1.35rem, 2vw, 2rem);
      }

      .gc-topbar select {
        flex: 0 0 auto;
        min-width: 8rem;
      }

      .gc-topbar gc-gps-link {
        flex: 0 0 auto;
        align-self: center;
      }

      .gc-message-footer {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 0.6rem;
        width: min(96vw, 1200px);
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <div class="w3-card w3-container w3-padding w3-border w3-round">
      <div class="gc-topbar w3-bar w3-light-gray w3-border w3-round">
        <div class="w3-bar-item w3-large"><h1>Groundcheck</h1></div>
        <div class="gc-topbar-spacer">
          <select class="w3-select w3-bar-item" id="gcLangSelect" title="Language"></select>
          <gc-gps-link class="w3-bar-item" id="gcGPSLink" title="GPS"></gc-gps-link>
        </div>
      </div>
    </div>
    <div class="w3-card w3-container w3-padding w3-border w3-round w3-margin-top">
        <div class="w3-row">
            <div class="w3-col w3-half">
                <div class="w3-row">
                    <div class="w3-col w3-half">
                        <gc-du-link id="gcDULink" title="DU"></gc-du-link>
                    </div>
                    <div class="w3-col w3-half w3-red w3-border">
                        <p>Graph Panel</p>
                    </div>
                </div>
            </div>
            <div class="w3-col w3-half">
              <gc-table id="MeasurementTable" tableNameIdentifier="MeasurementTable" title="Test Measurement Table">
              </gc-table>
            </div>
        </div>        
            <div class="w3-col w3-full">
              <gc-table id="SummaryTable" tableNameIdentifier="SummaryTable" title="Summary Table">
              </gc-table>
        </div>
    </div>
    <div class="w3-card w3-container w3-footer w3-padding w3-border w3-round w3-margin-top">
    <div class="gc-message-footer w3-hide-small">
      <gc-message-area id="gcMessageArea" max-entries="150"></gc-message-area>
    </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
